<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3A2A1A">
<title>Pueblo CaféBar — Sistema de Comandas</title>
<link rel="stylesheet" href="css/estilos.css?v=4">
</head>
<body>
<div id="app"></div>

<!-- Firebase (solo se usa si js/config.js tiene FIREBASE_CONFIG; si no carga, la app sigue en modo local) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<!-- ?v=N = "versión" para evitar la caché. SUBE este número (v=3 → v=4 …) cada vez
     que actualices css/js, así todos los equipos cargan la versión nueva al instante. -->
<script src="js/config.js?v=4"></script>
<script src="js/menu.js?v=4"></script>
<script src="js/sync.js?v=4"></script>
<script src="js/app.js?v=4"></script>
</body>
</html>
